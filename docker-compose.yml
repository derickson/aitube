services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3103:8000"
    env_file:
      - .env
    environment:
      - CONTENT_DLP_URL=http://host.docker.internal:7055
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "8103:80"
    depends_on:
      - backend
    restart: unless-stopped
