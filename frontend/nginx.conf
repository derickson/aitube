server {
    listen 80;

    location /aitube/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /aitube/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /aitube/index.html;
    }

    location = /aitube {
        return 301 /aitube/;
    }
}
